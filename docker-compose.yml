services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip_password
      POSTGRES_DB: paperclip
    volumes:
      - paperclip_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip"]
      interval: 5s
      timeout: 5s
      retries: 5

  paperclip:
    build: .
    image: paperclip-local
    restart: always
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:paperclip_password@db:5432/paperclip
      BETTER_AUTH_SECRET: paperclip_auth_secret_change_me
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      PAPERCLIP_DEPLOYMENT_EXPOSURE: private
      SERVE_UI: "true"
      HOST: "0.0.0.0"
      PORT: "3100"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - paperclip_app_data:/paperclip

  coworker:
    image: node:22-alpine # Or your custom coworker image
    command: sh -c "npx create-coworker-app@latest . && npm run start"
    restart: always
    ports:
      - "4111:4111"
    environment:
      - NODE_ENV=production
    volumes:
      - coworker_data:/data

  zeroclaw:
    image: ghcr.io/zeroclaw-labs/zeroclaw:latest
    restart: unless-stopped
    environment:
      - PROVIDER=openrouter
      - ZEROCLAW_ALLOW_PUBLIC_BIND=true
      - ZEROCLAW_GATEWAY_PORT=42617
    ports:
      - "42617:42617"
    volumes:
      - zeroclaw_data:/zeroclaw-data

volumes:
  paperclip_db_data:
  paperclip_app_data:
  coworker_data:
  zeroclaw_data:
